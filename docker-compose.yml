services:
  db:
    image: postgres:16
    container_name: rentroost-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: rentroost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - rentroost_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rentroost"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rentroost-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/rentroost?schema=public
      DIRECT_URL: postgresql://postgres:postgres@db:5432/rentroost?schema=public
      APP_URL: http://localhost:3001
      SESSION_COOKIE_NAME: rentroost_session
      SESSION_SECRET: replace-with-a-long-random-string
      BANK_PROVIDER_CLIENT_ID: ${BANK_PROVIDER_CLIENT_ID:-}
      BANK_PROVIDER_CLIENT_SECRET: ${BANK_PROVIDER_CLIENT_SECRET:-}
      BANK_PROVIDER_REDIRECT_URI: ${BANK_PROVIDER_REDIRECT_URI:-http://localhost:3001/api/banking/truelayer/callback}
      BANK_PROVIDER_ENV: ${BANK_PROVIDER_ENV:-sandbox}
      BANK_PROVIDER_BASE_URL: ${BANK_PROVIDER_BASE_URL:-}
      BANK_PROVIDER_AUTH_BASE_URL: ${BANK_PROVIDER_AUTH_BASE_URL:-}
      BANK_PROVIDER_ENCRYPTION_KEY: ${BANK_PROVIDER_ENCRYPTION_KEY:-}
      BANK_PROVIDER_JOB_SECRET: ${BANK_PROVIDER_JOB_SECRET:-}
      BANK_PROVIDER_WEBHOOK_SECRET: ${BANK_PROVIDER_WEBHOOK_SECRET:-}
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - rentroost_node_modules:/app/node_modules
      - rentroost_next_cache:/app/.next
    command: >
      sh -c "
      npx prisma generate &&
      npx prisma migrate deploy &&
      npm run prisma:seed &&
      npm run dev -- --hostname 0.0.0.0 --port 3000
      "

volumes:
  rentroost_postgres_data:
  rentroost_node_modules:
  rentroost_next_cache:
